<!DOCTYPE html>
<html>
<head>
    <title>Password Reset</title>
</head>
<body style="font-family:Arial; text-align:center; padding:50px;">

<h2>🔑 Reset Password</h2>

<p>Forgot your password? Enter your email address below, and we'll send you a link to reset it.</p>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" style="padding:10px 20px; background:#dc3545; color:white; border:none;">
        Send Reset Link
    </button>
</form>

<p><a href="{% url 'login' %}">Back to Login</a></p>

</body>
</html>
